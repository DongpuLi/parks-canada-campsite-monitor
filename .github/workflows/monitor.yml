name: Parks Canada campsite monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parks-canada-campsite-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium and system dependencies
        run: python -m playwright install --with-deps chromium

      - name: Check campsite availability
        env:
          PARKS_SEARCH_URL: ${{ secrets.PARKS_SEARCH_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          HEADLESS: "true"
        run: python monitor.py

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: campsite-monitor-${{ github.run_number }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: ignore
