name: Parks Canada campsite monitor

on:
  workflow_dispatch:
    inputs:
      search_url:
        description: "Optional one-time Parks Canada results URL"
        required: false
        type: string
      target_sites:
        description: "Optional one-time site numbers, e.g. 17,22,23"
        required: false
        type: string
      monitor_label:
        description: "Optional label for this one-time check"
        required: false
        type: string
  schedule:
    - cron: "22 * * * *"

permissions:
  contents: read

concurrency:
  group: parks-canada-campsite-monitor
  cancel-in-progress: true

jobs:
  check:
    # Scheduled checks obey MONITOR_ENABLED.
    # Manual runs are always allowed for testing.
    if: github.event_name == 'workflow_dispatch' || vars.MONITOR_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium and system dependencies
        run: python -m playwright install --with-deps chromium

      - name: Check campsite availability
        env:
          PARKS_SEARCH_URL: ${{ inputs.search_url || vars.PARKS_SEARCH_URL }}
          TARGET_SITES: ${{ inputs.target_sites || vars.TARGET_SITES }}
          MONITOR_LABEL: ${{ inputs.monitor_label || vars.MONITOR_LABEL }}
          HEADLESS: "true"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: python -u monitor.py

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: campsite-monitor-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
